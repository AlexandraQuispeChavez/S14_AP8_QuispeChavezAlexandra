<nav class="navbar">
  <div class="navbar-brand">
    <img src="assets/logo.svg" alt="logo" class="brand-logo-img" onerror="this.style.display='none'">
    <span class="brand-name">BebéVida <small>Neonatología</small></span>
  </div>

  @if (authService.isLoggedIn()) {
    <ul class="navbar-links">
      <li><a routerLink="/inicio" routerLinkActive="active">Inicio</a></li>
      <li><a routerLink="/especialidades" routerLinkActive="active">Especialidades</a></li>
      <li><a routerLink="/medicos" routerLinkActive="active">Médicos</a></li>
      <li><a routerLink="/contacto" routerLinkActive="active">Contacto</a></li>
    </ul>

    <div class="navbar-user">
      <span class="user-info">
        <span class="user-email">{{ authService.getUser() }}</span>
      </span>
      <button class="btn-logout" (click)="logout()">Cerrar Sesión</button>
    </div>
  }
